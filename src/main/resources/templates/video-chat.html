<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="#">
    <link rel="stylesheet" href="/css/video-chat.css?v=20260723_7">

    <!-- 구글 폰트 & 아이콘 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- MediaPipe Selfie Segmentation -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

    <title>CODEGRASS - VIDEOCHAT</title>
</head>
<body class="layout-speaker">

<div id="videoContainer">
    <!-- 매니저 비디오 (왼쪽 절반) -->
    <div id="managerVideoContainer">
        <video id="managerVideo" autoplay muted></video>
        <!-- 화면 공유 시 내 얼굴을 띄워줄 작은 비디오 요소 -->
        <video id="localCameraVideo" autoplay muted></video>



        <!-- 메뉴바 추가 -->
        <div id="managerMenuBar" style="background-color: rgba(0, 0, 0, 0.7); display: flex; gap: 20px; padding: 12px 25px; border-radius: 30px; bottom: 20px; width: auto; position: absolute; left: 50%; transform: translateX(-50%); z-index: 100; align-items: center; justify-content: center;">
            <button id="toggleAudioBtn" onclick="window.toggleAudio()" title="마이크 켜기/끄기" style="background: transparent; color: white; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;" id="audioIcon">mic</span>
            </button>
            <button id="toggleCameraBtn" onclick="window.toggleCamera()" title="카메라 켜기/끄기" style="background: transparent; color: white; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;" id="cameraIcon">videocam</span>
            </button>
            <button id="toggleScreenShare" title="화면 공유" style="background: transparent; color: white; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">present_to_all</span>
            </button>
            <button id="inviteBtn" onclick="window.copyInviteLink()" title="초대하기" style="background: transparent; color: #4ade80; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">person_add</span>
            </button>
            <button id="toggleChatBtn" onclick="const p = document.getElementById('chatPanel'); p.style.display = p.style.display === 'none' ? 'flex' : 'none';" title="채팅하기" style="background: transparent; color: #60a5fa; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">chat</span>
            </button>
            <button id="toggleMemberVideoBtn" onclick="window.toggleMemberVideoPanel()" title="참가자 영상 열기/닫기" style="background: transparent; color: #f472b6; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">video_library</span>
            </button>
            <button id="toggleBgBtn" onclick="document.getElementById('bgModal').style.display = document.getElementById('bgModal').style.display === 'none' ? 'block' : 'none';" title="배경" style="background: transparent; color: #a855f7; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">landscape</span>
            </button>
            <button id="toggleViewBtn" onclick="window.toggleViewMode()" title="타일 보기 전환" style="background: transparent; color: #fbbf24; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;" id="viewIcon">grid_view</span>
            </button>
            <button id="toggleMemberListPanel" title="참가자 명단" style="background: transparent; color: white; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">group</span>
            </button>
        </div>
    </div>

    <!-- 멤버 비디오 (오른쪽 절반) -->
    <div id="memberVideosContainer"></div>

    <!-- 멤버 리스트 패널 -->
    <div id="memberListPanel">
        <div id="memberListHeader">
            <span>참여중인 사용자</span>
            <button id="closeMemberListPanel">X</button>
        </div>
        <ul id="memberList"></ul>
    </div>

    <!-- 채팅 패널 추가 -->
    <div id="chatPanel" style="display: none; position: absolute; right: 0; top: 0; width: 320px; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); z-index: 100; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.2); box-shadow: -4px 0 15px rgba(0,0,0,0.5);">
        <div style="padding: 15px; background: rgba(255, 255, 255, 0.1); color: white; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2);">
            <span style="font-size: 16px;">채팅</span>
            <button onclick="document.getElementById('chatPanel').style.display='none'" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold; font-size: 16px; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">X</button>
        </div>
        <div id="chatMessages" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: transparent;"></div>
        <div style="padding: 15px; border-top: 1px solid rgba(255,255,255,0.2); display: flex; background: rgba(0, 0, 0, 0.3);">
            <input type="text" id="chatInput" placeholder="메시지 입력..." style="flex: 1; padding: 10px; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.1); color: white; outline: none; transition: border 0.3s;" onfocus="this.style.borderColor='#4ade80'" onblur="this.style.borderColor='rgba(255,255,255,0.3)'" onkeypress="if(event.key==='Enter') window.sendChatMessage()">
            <button onclick="window.sendChatMessage()" style="margin-left: 8px; padding: 10px 16px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s;" onmouseover="this.style.background='#0056b3'" onmouseout="this.style.background='#007bff'">전송</button>
        </div>
    </div>
</div>

<input type="hidden" id="videoModalSessionId" value="">
<input type="hidden" id="microphoneIsEnabled" value="false">

<!-- 비디오 모달 추가 -->
<div id="memberVideoModal">
    <video id="videoModal" autoplay playsinline></video>
    <button id="closeVideoModalBtn" onclick="closeVideoModal()"></button>
    <button id="microphoneControlBtn" onclick="sendMicrophone()"></button>
</div>

<script>
    const pathname = window.location.pathname;
    const role = pathname.split('/').pop();
    console.log('role = ', role);
    if(role !== 'manager') {
        document.getElementById('toggleScreenShare').style.display = 'none';
    }
</script>
<script src='/js/webrtc.js?v=20260723_8'></script>
<script type="module" src="/js/member-panel.js?v=20260723_8" defer></script>
<script type="module" src="/js/video-grid.js?v=20260723_8" defer></script>
<script type="module" src="/js/screen-share.js?v=20260723_8" defer></script>
<script src="/js/virtual-background.js?v=20260723_8" defer></script>
<!-- 배경 선택 모달 -->
<div id="bgModal" style="display: none; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 20px; border-radius: 15px; z-index: 101; width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px;">
        <h3 style="color: white; margin: 0; font-size: 16px;">배경 선택</h3>
        <button onclick="document.getElementById('bgModal').style.display='none'" style="background: none; border: none; color: white; cursor: pointer; font-size: 16px; font-weight: bold;">X</button>
    </div>
    <div id="bgGrid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-height: 300px; overflow-y: auto; padding-right: 5px;">
        <!-- JS에서 배경 목록을 주입 -->
    </div>
</div>

<script>
    const bgList = [
        { name: '원본', type: 'none' },
        { name: '배경흐림', type: 'blur' },
        { name: '카페', type: 'url', url: 'https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=300&q=80' },
        { name: '산', type: 'url', url: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=300&q=80' },
        { name: '해변', type: 'url', url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=300&q=80' },
        { name: '밤하늘', type: 'url', url: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=300&q=80' },
        { name: '사막', type: 'url', url: 'https://images.unsplash.com/photo-1473580044384-7ba9967e16a0?auto=format&fit=crop&w=300&q=80' },
        { name: '숲', type: 'url', url: 'https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=300&q=80' },
        { name: '도서관', type: 'url', url: 'https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=300&q=80' },
        { name: '강변', type: 'url', url: 'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=300&q=80' },
        { name: '스카이라운지', type: 'url', url: 'https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=300&q=80' },
        { name: '산토리니', type: 'url', url: 'https://images.unsplash.com/photo-1533104816931-20fa691ff6ca?auto=format&fit=crop&w=300&q=80' },
        { name: '우주', type: 'url', url: 'https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=300&q=80' },
        { name: '도시야경', type: 'url', url: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=300&q=80' },
        { name: '바다밑', type: 'url', url: 'https://images.unsplash.com/photo-1682687982501-1e58b814714c?auto=format&fit=crop&w=300&q=80' },
        { name: '설원', type: 'url', url: 'https://images.unsplash.com/photo-1478265409131-1f65c88f965c?auto=format&fit=crop&w=300&q=80' },
        { name: '사무실', type: 'url', url: 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=300&q=80' },
        { name: '꽃밭', type: 'url', url: 'https://images.unsplash.com/photo-1490750967868-88cb147861a3?auto=format&fit=crop&w=300&q=80' },
        { name: '가을단풍', type: 'url', url: 'https://images.unsplash.com/photo-1507371341162-763b5e419408?auto=format&fit=crop&w=300&q=80' },
        { name: '눈내리는마을', type: 'url', url: 'https://images.unsplash.com/photo-1517260739337-6799d239ce83?auto=format&fit=crop&w=300&q=80' }
    ];

    const bgGrid = document.getElementById('bgGrid');
    if (bgGrid) {
        bgList.forEach(bg => {
            const btn = document.createElement('button');
            btn.style.width = '100%';
            btn.style.height = '60px';
            btn.style.border = '2px solid transparent';
            btn.style.borderRadius = '8px';
            btn.style.cursor = 'pointer';
            btn.style.overflow = 'hidden';
            btn.style.position = 'relative';
            btn.style.padding = '0';
            btn.style.backgroundColor = '#333';
            btn.title = bg.name;
            
            btn.onmouseover = () => btn.style.border = '2px solid #007bff';
            btn.onmouseout = () => btn.style.border = '2px solid transparent';

            if (bg.type === 'none') {
                btn.innerHTML = '<span class="material-symbols-outlined" style="color:white; font-size: 30px; display: block; margin-top: 15px;">person</span>';
            } else if (bg.type === 'blur') {
                btn.innerHTML = '<span class="material-symbols-outlined" style="color:white; font-size: 30px; display: block; margin-top: 15px;">blur_on</span>';
            } else {
                btn.style.backgroundImage = `url(${bg.url})`;
                btn.style.backgroundSize = 'cover';
                btn.style.backgroundPosition = 'center';
            }

            const label = document.createElement('span');
            label.innerText = bg.name;
            label.style.position = 'absolute';
            label.style.bottom = '0';
            label.style.left = '0';
            label.style.width = '100%';
            label.style.background = 'rgba(0,0,0,0.6)';
            label.style.color = 'white';
            label.style.fontSize = '10px';
            label.style.padding = '2px 0';
            label.style.textAlign = 'center';
            
            btn.appendChild(label);
            
            btn.onclick = () => {
                const val = bg.type === 'url' ? bg.url.replace('w=300', 'w=1280') : bg.type;
                if(typeof window.setVirtualBackground === 'function') window.setVirtualBackground(val);
                document.getElementById('bgModal').style.display = 'none';
            };
            bgGrid.appendChild(btn);
        });
    }
</script>
</body>
</html>
