<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="#">
    <link rel="stylesheet" href="/css/video-chat.css">

    <!-- 구글 폰트 & 아이콘 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- MediaPipe Selfie Segmentation -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

    <title>CODEGRASS - VIDEOCHAT</title>
</head>
<body class="layout-speaker">

<div id="videoContainer">
    <!-- 매니저 비디오 (왼쪽 절반) -->
    <div id="managerVideoContainer">
        <video id="managerVideo" autoplay muted></video>
        <!-- 화면 공유 시 내 얼굴을 띄워줄 작은 비디오 요소 -->
        <video id="localCameraVideo" autoplay muted></video>

        <!-- 배경 선택기 추가 -->
        <div id="bgSelector" style="position: absolute; bottom: 80px; left: 10px; z-index: 100; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; display: flex; gap: 10px;">
            <button onclick="window.setVirtualBackground('none')">원본</button>
            <button onclick="window.setVirtualBackground('blur')">배경흐림</button>
            <button onclick="window.setVirtualBackground('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=500&q=60')">해변</button>
            <button onclick="window.setVirtualBackground('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=500&q=60')">사무실</button>
            <button onclick="window.setVirtualBackground('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=500&q=60')">산</button>
        </div>

        <!-- 메뉴바 추가 -->
        <div id="managerMenuBar" style="background-color: rgba(0, 0, 0, 0.7); display: flex; gap: 20px; padding: 12px 25px; border-radius: 30px; bottom: 20px; width: auto; position: absolute; left: 50%; transform: translateX(-50%); z-index: 100; align-items: center; justify-content: center;">
            <button id="toggleAudioBtn" onclick="window.toggleAudio()" title="마이크 켜기/끄기" style="background: transparent; color: white; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;" id="audioIcon">mic</span>
            </button>
            <button id="toggleCameraBtn" onclick="window.toggleCamera()" title="카메라 켜기/끄기" style="background: transparent; color: white; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;" id="cameraIcon">videocam</span>
            </button>
            <button id="toggleScreenShare" title="화면 공유" style="background: transparent; color: white; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">present_to_all</span>
            </button>
            <button id="inviteBtn" onclick="window.copyInviteLink()" title="초대하기" style="background: transparent; color: #4ade80; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">person_add</span>
            </button>
            <button id="toggleChatBtn" onclick="const p = document.getElementById('chatPanel'); p.style.display = p.style.display === 'none' ? 'flex' : 'none';" title="채팅하기" style="background: transparent; color: #60a5fa; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">chat</span>
            </button>
            <button id="toggleMemberVideoBtn" onclick="window.toggleMemberVideoPanel()" title="참가자 영상 열기/닫기" style="background: transparent; color: #f472b6; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">video_library</span>
            </button>
            <button id="toggleViewBtn" onclick="window.toggleViewMode()" title="타일 보기 전환" style="background: transparent; color: #fbbf24; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;" id="viewIcon">grid_view</span>
            </button>
            <button id="toggleMemberListPanel" title="참가자 명단" style="background: transparent; color: white; border: none; cursor: pointer; transition: 0.2s;">
                <span class="material-symbols-outlined" style="font-size: 28px;">group</span>
            </button>
        </div>
    </div>

    <!-- 멤버 비디오 (오른쪽 절반) -->
    <div id="memberVideosContainer"></div>

    <!-- 멤버 리스트 패널 -->
    <div id="memberListPanel">
        <div id="memberListHeader">
            <span>참여중인 사용자</span>
            <button id="closeMemberListPanel">X</button>
        </div>
        <ul id="memberList"></ul>
    </div>

    <!-- 채팅 패널 추가 -->
    <div id="chatPanel" style="display: none; position: absolute; right: 0; top: 0; width: 300px; height: 100%; background: white; z-index: 100; flex-direction: column; border-left: 1px solid #ccc; box-shadow: -2px 0 5px rgba(0,0,0,0.5);">
        <div style="padding: 10px; background: #333; color: white; display: flex; justify-content: space-between; font-weight: bold;">
            <span>채팅</span>
            <button onclick="document.getElementById('chatPanel').style.display='none'" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold;">X</button>
        </div>
        <div id="chatMessages" style="flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9;"></div>
        <div style="padding: 10px; border-top: 1px solid #ccc; display: flex; background: white;">
            <input type="text" id="chatInput" placeholder="메시지 입력..." style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" onkeypress="if(event.key==='Enter') window.sendChatMessage()">
            <button onclick="window.sendChatMessage()" style="margin-left: 5px; padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">전송</button>
        </div>
    </div>
</div>

<input type="hidden" id="videoModalSessionId" value="">
<input type="hidden" id="microphoneIsEnabled" value="false">

<!-- 비디오 모달 추가 -->
<div id="memberVideoModal">
    <video id="videoModal" autoplay playsinline></video>
    <button id="closeVideoModalBtn" onclick="closeVideoModal()"></button>
    <button id="microphoneControlBtn" onclick="sendMicrophone()"></button>
</div>

<script>
    const pathname = window.location.pathname;
    const role = pathname.split('/').pop();
    console.log('role = ', role);
    if(role !== 'manager') {
        document.getElementById('toggleScreenShare').style.display = 'none';
    }
</script>
<script src='/js/webrtc.js'></script>
<script type="module" src="/js/member-panel.js" defer></script>
<script type="module" src="/js/video-grid.js" defer></script>
<script type="module" src="/js/screen-share.js" defer></script>
<script src="/js/virtual-background.js" defer></script>
</body>
</html>
